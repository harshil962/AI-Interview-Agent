{% extends "base.html" %}
{% block title %}Profile - AI Interview Practice Agent{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-8 col-lg-6">

            <div style="margin-bottom:2rem;" class="fade-up">
                <p class="page-eyebrow">Account</p>
                <h2 class="page-heading">My Profile</h2>
            </div>

            <div class="page-card fade-up fade-up-1">
                <div style="display:flex;align-items:center;gap:1rem;margin-bottom:2rem;padding-bottom:1.5rem;border-bottom:1px solid var(--border);">
                    <div class="profile-avatar">{{ user['name'][0].upper() }}</div>
                    <div>
                        <p style="font-family:'Syne',sans-serif;font-weight:700;font-size:1.1rem;margin:0;color:var(--txt1);">{{ user['name'] }}</p>
                        <p style="color:var(--txt3);font-size:13px;margin:0;">{{ user['email'] }}</p>
                    </div>
                </div>

                <div class="mb-4">
                    <label class="form-label">Full Name</label>
                    <input type="text" class="form-control" value="{{ user['name'] }}" disabled>
                </div>
                <div class="mb-4">
                    <label class="form-label">Email Address</label>
                    <input type="text" class="form-control" value="{{ user['email'] }}" disabled>
                </div>

                <form method="POST">
                    <div class="mb-4">
                        <label class="form-label">Preferred Practice Topic</label>
                        <select name="preferred_topic" class="form-select">
                            <option value="Python" {% if user['preferred_topic'] == 'Python' %}selected{% endif %}>🐍 Python</option>
                            <option value="OOP"    {% if user['preferred_topic'] == 'OOP' %}selected{% endif %}>🧩 OOP</option>
                            <option value="DBMS"   {% if user['preferred_topic'] == 'DBMS' %}selected{% endif %}>🗄️ DBMS</option>
                            <option value="HR"     {% if user['preferred_topic'] == 'HR' %}selected{% endif %}>🤝 HR</option>
                        </select>
                        <p style="font-size:12px;color:var(--txt3);margin-top:7px;">This will be used as your default topic when starting interviews.</p>
                    </div>
                    <button type="submit" class="btn-main">Save Changes</button>
                </form>
            </div>

        </div>
    </div>
</div>
{% endblock %}
